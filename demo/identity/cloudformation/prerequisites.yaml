AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Module 03 Identity Demo Prerequisites.
  Creates: Cognito User Pool, IAM role, S3 bucket for agent code.

Parameters:
  BucketPrefix:
    Type: String
    Default: agentcore-identity
    Description: S3 bucket name prefix (appends account-id and region)

Resources:
  # ── S3 Bucket ────────────────────────────────────────────────────────────────
  CodeArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketPrefix}-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireArtifacts
            Status: Enabled
            ExpirationInDays: 7

  # ── Cognito User Pool ────────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'agentcore-identity-demo-${AWS::Region}'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email

  # ── Cognito Domain ──────────────────────────────────────────────────────────
  CognitoDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Domain: !Sub 'ac-identity-${AWS::AccountId}'

  # ── Cognito Resource Server (M2M scopes) ────────────────────────────────────
  CognitoResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Identifier: internal-api
      Name: InternalAPI
      Scopes:
        - ScopeName: read
          ScopeDescription: Read access
        - ScopeName: write
          ScopeDescription: Write access

  # ── App Client: User-facing (inbound auth) ──────────────────────────────────
  CognitoUserClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: demo-user-client
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false

  # ── App Client: Machine (M2M client_credentials) ────────────────────────────
  CognitoMachineClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - CognitoResourceServer
      - CognitoDomain
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: demo-machine-client
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - internal-api/read
        - internal-api/write
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO

  # ── IAM Execution Role ──────────────────────────────────────────────────────
  AgentCoreExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'agentcore-m03-demo-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: AgentCoreRuntimePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:DescribeLogStreams
                  - logs:CreateLogGroup
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*'
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*:log-stream:*'
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: '*'
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: bedrock-agentcore
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - 'arn:aws:bedrock:*::foundation-model/*'
                  - !Sub 'arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*'
              - Effect: Allow
                Action:
                  - bedrock-agentcore:GetWorkloadAccessToken
                Resource:
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/*/workload-identity/*'
              - Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceApiKey
                  - bedrock-agentcore:GetResourceOauth2Token
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:bedrock-agentcore*'

Outputs:
  BucketName:
    Value: !Ref CodeArtifactBucket

  ExecutionRoleArn:
    Value: !GetAtt AgentCoreExecutionRole.Arn

  CognitoUserPoolId:
    Value: !Ref CognitoUserPool

  CognitoUserClientId:
    Value: !Ref CognitoUserClient

  CognitoMachineClientId:
    Value: !Ref CognitoMachineClient

  CognitoDiscoveryUrl:
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}/.well-known/openid-configuration'

  CognitoTokenEndpoint:
    Value: !Sub 'https://ac-identity-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'

  Region:
    Value: !Ref AWS::Region
